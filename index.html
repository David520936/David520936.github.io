<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>请我喝杯奶茶~</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{
background:url(BJQ.jpg) center/cover no-repeat;
min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px
}
.card{
background:rgba(255,255,255,0.95);
width:100%;max-width:380px;padding:40px 30px;border-radius:22px;
text-align:center;box-shadow:0 12px 35px rgba(0,0,0,0.1)
}
.title{font-size:22px;color:#333;margin-bottom:10px}
.price{font-size:28px;color:#ff6582;font-weight:bold;margin:10px 0 20px}
.qrcode{width:220px;height:220px;margin:0 auto}
.qrcode img{width:100%;height:100%;border-radius:12px}
.input{
width:100%;padding:14px;margin-top:20px;border-radius:12px;border:1px solid #ddd;
text-align:center;font-size:16px
}
.btn{
width:100%;padding:16px;margin-top:15px;background:#ff6582;color:#fff;
border:none;border-radius:30px;font-size:16px;font-weight:bold
}
.tip{margin-top:12px;color:#888;font-size:13px}
#msg{color:red;margin-top:10px;font-size:14px}
</style>

<div class="card">
  <div class="title">谢谢哥哥请我喝一杯奶茶</div>
  <div class="price">¥ 8.80</div>
  <div class="qrcode">
    <img src="DSM.jpg" alt="收款码">
  </div>
  <input class="input" id="code" placeholder="输入转账单号后4位解锁" maxlength="4">
  <button class="btn" onclick="check()">已请我喝啦</button>
  <div id="msg"></div>
  <div class="tip">支付成功后输入单号后四位解锁</div>
</div>

<script>
function check(){
  const v = document.getElementById('code').value.trim();
  // 这里改成你想要的4位数字，只有付款的人能看到
  if(v === "1314"){
    location.href = "success.html";
  }else{
    document.getElementById('msg').innerText = "验证码不正确";
  }
}
</script>
